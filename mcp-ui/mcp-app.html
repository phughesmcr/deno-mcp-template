<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website info</title>
  </head>
  <body>
    <div id="root" class="root">
      <header class="header">
        <h1 class="title">Website info</h1>
        <p class="subtitle">HEAD response preview (MCP App)</p>
      </header>
      <section class="panel" id="input-panel">
        <p class="label">Request URL</p>
        <p class="url mono" id="arg-url">—</p>
      </section>
      <section class="panel" id="result-panel" hidden>
        <p class="label">Result</p>
        <dl class="meta" id="result-meta"></dl>
        <p class="label">Selected headers</p>
        <table class="headers" id="headers-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Value</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
      <section class="panel error" id="error-panel" hidden>
        <p class="label">Error</p>
        <pre class="mono" id="error-text"></pre>
      </section>
    </div>
    <script type="module" src="./src/mcp-app.ts"></script>
  </body>
</html>
