name: MCP conformance

on:
  push:
  pull_request:

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Start MCP server
        env:
          MCP_HTTP_RATE_LIMIT_ENABLED: "false"
        run: |
          deno run -A main.ts --no-stdio --no-http-rate-limit &
          echo $! > "${RUNNER_TEMP}/mcp-server.pid"

      - name: Wait for HTTP MCP
        run: |
          timeout 120 bash -c 'until curl -sS -o /dev/null http://localhost:3001/mcp; do sleep 0.5; done'

      - uses: modelcontextprotocol/conformance@v0.1.16
        with:
          mode: server
          url: http://localhost:3001/mcp
          expected-failures: conformance-baseline.yml

      - name: Stop MCP server
        if: always()
        run: |
          if [[ -f "${RUNNER_TEMP}/mcp-server.pid" ]]; then
            kill "$(cat "${RUNNER_TEMP}/mcp-server.pid")" 2>/dev/null || true
          fi
